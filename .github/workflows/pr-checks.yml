name: PR Checks

# Runs lint + unit tests + full component build on every PR to main.
# Rationale: the Publish Packages / deploy workflows only trigger `on: push`
# to main/develop, so build/type errors (e.g. a `build:types` failure) used to
# reach main undetected and break publishing. This gate catches them in the PR.
on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    env:
      GBP_PACKAGE_TOKEN: ${{ secrets.GBP_PACKAGE_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history so we can diff the PR head against its base branch
          # to lint only the files this PR changed (see the Lint step below).
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Enable Corepack and Install Yarn 4.7.0
        run: |
          corepack enable
          corepack prepare yarn@4.7.0 --activate

      - name: Verify environment variables
        run: |
          if [ -z "$GBP_PACKAGE_TOKEN" ]; then
            echo "::error::GBP_PACKAGE_TOKEN no está configurado"
            exit 1
          fi
          echo "✅ Variables de entorno configuradas correctamente"

      - name: Install dependencies
        run: yarn install

      # Lint ONLY the files this PR changed, not the whole repo. A full-repo
      # `eslint . --max-warnings 0` fails on pre-existing lint debt in unrelated
      # files (e.g. stories/*.stories.ts) that the PR never touched, which made
      # this gate red on every PR regardless of its contents. Scoping to the
      # PR's own diff keeps the gate meaningful: it blocks NEW lint errors the PR
      # introduces (and still enforces the element-plus import guard on any
      # migrated package, since those files are in the diff) without punishing a
      # PR for debt it did not create.
      - name: Lint changed files (eslint --max-warnings 0)
        run: |
          git fetch origin "$GITHUB_BASE_REF" --quiet
          FILES=$(git diff --name-only --diff-filter=ACMR "origin/$GITHUB_BASE_REF"...HEAD -- '*.vue' '*.ts' '*.js' '*.jsx' '*.tsx')
          if [ -z "$FILES" ]; then
            echo "No lintable files changed in this PR — skipping lint."
            exit 0
          fi
          echo "Linting files changed in this PR:"
          echo "$FILES"
          yarn eslint $FILES --max-warnings 0

      # Build BEFORE tests. Several packages are `buildable` and expose their
      # entry via `exports` → `dist/` (e.g. g-form, g-icon-font). The unit tests
      # import those packages by their bare specifier, so `dist/` must exist
      # before Vitest can resolve them — in CI nothing is pre-built, so running
      # tests first fails with "Failed to resolve entry for package
      # @flash-global66/g-form". Building first also surfaces build:types
      # (vue-tsc) errors before tests run. (source-only packages g-utils/g-hooks
      # resolve from src and don't need this.)
      #
      # Full build (not scoped) because latent type errors surface when
      # dependency bumps force dependents to rebuild — a scoped run can miss them.
      - name: Build all components
        run: yarn build

      - name: Unit tests (Vitest)
        run: yarn test:run
